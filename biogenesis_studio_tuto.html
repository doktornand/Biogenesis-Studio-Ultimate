function renderCode(code) {
  return `<div class="code-block">${code}</div>`;
}

function renderStep(s, i) {
  let html = `<div class="step">
    <div class="step-head">
      <div class="step-num">${i+1}</div>
      <div class="step-title">${s.title}</div>
    </div>
    <div class="step-body">`;
  if (s.body) html += `<p style="margin-bottom:6px">${s.body}</p>`;
  if (s.pipeline) {
    html += `<div class="pipeline">`;
    s.pipeline.forEach(p => {
      if (p === "→") html += `<span class="pipe-arr">→</span>`;
      else html += `<span class="pipe-box">${p}</span>`;
    });
    html += `</div>`;
  }
  if (s.tags) {
    html += `<div class="tag-row">`;
    s.tags.forEach(t => { html += `<span class="tag ${t}">${t}</span>`; });
    html += `</div>`;
  }
  if (s.code) html += renderCode(s.code);
  if (s.note) html += `<div class="note">${s.note}</div>`;
  if (s.warn) html += `<div class="warn"><strong>Attention :</strong> ${s.warn}</div>`;
  if (s.ask) html += `<button class="ask-btn" onclick="sendPrompt('${s.ask}')"><i class="ti ti-arrow-right" aria-hidden="true"></i> ${s.ask} ↗</button>`;
  html += `</div></div>`;
  return html;
}

    <div class="session-title">${sess.title}</div>
    <div class="session-desc">${sess.desc}</div>
  </div><div class="session-body">`;
  sess.steps.forEach((s, i) => { html += renderStep(s, i); });
  html += `</div>`;
  return html;
}

let current = 0;
const nav = document.getElementById('nav');
const card = document.getElementById('card');

function activate(i) {
  current = i;
  nav.querySelectorAll('.nav-btn').forEach((b, j) => {
    b.classList.toggle('active', j === i);
  });
  card.innerHTML = renderSession(sessions[i]);
}

sessions.forEach((s, i) => {
  const btn = document.createElement('button');
  btn.className = 'nav-btn';
  btn.textContent = s.label;
  btn.onclick = () => activate(i);
  nav.appendChild(btn);
});

activate(0);
</script>
